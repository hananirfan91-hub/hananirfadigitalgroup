  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0b12;
      color: #f0f0f7;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      width: 100%;
    }
    
    /* Header/Logo */
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(145deg, #b2a5ff, #ff9ec7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .logo span {
      font-size: 1rem;
      color: #aaa;
      margin-left: 8px;
      -webkit-text-fill-color: #aaa;
    }
    .back-home {
      color: #b2a5ff;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .back-home i {
      margin-right: 5px;
    }

    /* Auth Card */
    .auth-card {
      background: #15151f;
      border-radius: 40px;
      padding: 40px;
      border: 1px solid #2b2b3a;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 1px solid #2b2b3a;
      padding-bottom: 20px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      background: transparent;
      border: none;
      color: #aaa;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      border-radius: 30px;
      transition: 0.3s;
    }
    .tab.active {
      background: #6c5dd3;
      color: white;
    }
    .tab:not(.active):hover {
      background: #2b2b3a;
      color: #ddd;
    }

    /* Forms */
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #b0b0c8;
      font-weight: 500;
    }
    .input-group {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-group i {
      position: absolute;
      left: 15px;
      color: #b2a5ff;
      font-size: 1.1rem;
    }
    .input-group input {
      width: 100%;
      padding: 16px 20px 16px 45px;
      background: #20202b;
      border: 2px solid #2b2b3a;
      border-radius: 30px;
      color: white;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: 0.3s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #6c5dd3;
      box-shadow: 0 0 0 3px rgba(108, 93, 211, 0.2);
    }
    .toggle-password {
      position: absolute;
      right: 15px;
      color: #888;
      cursor: pointer;
    }
    .toggle-password:hover {
      color: #b2a5ff;
    }

    /* Password strength (for signup) */
    .password-strength {
      margin-top: 8px;
      height: 5px;
      background: #2b2b3a;
      border-radius: 5px;
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      width: 0%;
      transition: 0.3s;
    }
    .strength-text {
      font-size: 0.8rem;
      margin-top: 5px;
      color: #888;
    }

    /* Checkbox */
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
    }
    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c5dd3;
    }
    .checkbox-group a {
      color: #b2a5ff;
      text-decoration: none;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 16px;
      background: #6c5dd3;
      border: none;
      border-radius: 30px;
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }
    .btn:hover {
      background: #5849b8;
      transform: translateY(-2px);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Error/Success messages */
    .message {
      padding: 15px;
      border-radius: 30px;
      margin: 20px 0;
      display: none;
    }
    .message.error {
      background: #3a1f2a;
      border: 1px solid #ff6b6b;
      color: #ffb3b3;
    }
    .message.success {
      background: #1a3a2a;
      border: 1px solid #4caf50;
      color: #b2ffb2;
    }
    .message.info {
      background: #1e2a3a;
      border: 1px solid #4a90e2;
      color: #b2d9ff;
    }

    /* Footer links */
    .auth-footer {
      text-align: center;
      margin-top: 25px;
      color: #888;
    }
    .auth-footer a {
      color: #b2a5ff;
      text-decoration: none;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 500px) {
      .auth-card {
        padding: 25px;
      }
    }
  </style>

<body>
  <div class="container">
    <!-- Header -->
    <div class="auth-header">
      <div class="logo">Hanan Irfan Digital <span>solve & deliver</span></div>
      <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>

    <!-- Main Auth Card -->
    <div class="auth-card">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" id="loginTab" onclick="switchTab('login')">Login</button>
        <button class="tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Message Display -->
      <div id="messageBox" class="message"></div>

      <!-- LOGIN FORM -->
      <div id="loginForm" class="auth-form active">
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-group">
              <i class="fas fa-envelope"></i>
              <input type="email" id="loginEmail" placeholder="your@email.com" required>
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-group">
              <i class="fas fa-lock"></i>
              <input type="password" id="loginPassword" placeholder="••••••••" required>
              <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword')"></i>
            </div>
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Remember me</label>
            <a href="#" onclick="forgotPassword()" style="margin-left: auto;">Forgot password?</a>
          </div>

          <button type="submit" class="btn" id="loginBtn">Login</button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="#" onclick="switchTab('signup')">Sign up</a>
        </div>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signupForm" class="auth-form">
        <form onsubmit="handleSignup(event)">
          <div class="form-group">
            <label>Full Name</label>
            <div class="input-group">
              <i class="fas fa-user"></i>
              <input type="text" id="signupName" placeholder="Hanan Irfan" required>
            </div>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <div class="input-group">
              <i class="fas fa-envelope"></i>
              <input type="email" id="signupEmail" placeholder="your@email.com" required>
            </div>
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <div class="input-group">
              <i class="fas fa-phone"></i>
              <input type="tel" id="signupPhone" placeholder="+92 312 7654321">
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-group">
              <i class="fas fa-lock"></i>
              <input type="password" id="signupPassword" placeholder="••••••••" onkeyup="checkPasswordStrength()" required>
              <i class="fas fa-eye toggle-password" onclick="togglePassword('signupPassword')"></i>
            </div>
            <div class="password-strength">
              <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="strength-text" id="strengthText">Enter a strong password</div>
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-group">
              <i class="fas fa-lock"></i>
              <input type="password" id="signupConfirmPassword" placeholder="••••••••" required>
              <i class="fas fa-eye toggle-password" onclick="togglePassword('signupConfirmPassword')"></i>
            </div>
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="agreeTerms" required>
            <label for="agreeTerms">I agree to the <a href="terms.html" target="_blank">Terms & Conditions</a> and <a href="privacy.html" target="_blank">Privacy Policy</a></label>
          </div>

          <button type="submit" class="btn" id="signupBtn">Create Account</button>
        </form>

        <div class="auth-footer">
          Already have an account? <a href="#" onclick="switchTab('login')">Login</a>
        </div>
      </div>
    </div>

    <!-- Demo Users Info -->
    <div style="text-align: center; margin-top: 20px; color: #888; font-size: 0.9rem;">
      <i class="fas fa-shield-alt"></i> Secured with Firebase Authentication & Firestore
    </div>
  </div>

  <script>
    // ==================== FIREBASE CONFIGURATION ====================
    const firebaseConfig = {
      apiKey: "AIzaSyBZIowYPwtGQgCIAVqnIm1-hvH3Vf4wYs0",
      authDomain: "hidigitalgroup.firebaseapp.com",
      projectId: "hidigitalgroup",
      storageBucket: "hidigitalgroup.firebasestorage.app",
      messagingSenderId: "985354465508",
      appId: "1:985354465508:web:abb1068a42e48512327cf1"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ==================== UI HELPERS ====================
    function showMessage(text, type = 'info') {
      const msgBox = document.getElementById('messageBox');
      msgBox.style.display = 'block';
      msgBox.className = `message ${type}`;
      msgBox.innerHTML = text;
      
      if (type === 'success') {
        setTimeout(() => {
          msgBox.style.display = 'none';
        }, 5000);
      }
    }

    function switchTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      const loginTab = document.getElementById('loginTab');
      const signupTab = document.getElementById('signupTab');
      
      if (tab === 'login') {
        loginForm.classList.add('active');
        signupForm.classList.remove('active');
        loginTab.classList.add('active');
        signupTab.classList.remove('active');
      } else {
        loginForm.classList.remove('active');
        signupForm.classList.add('active');
        loginTab.classList.remove('active');
        signupTab.classList.add('active');
      }
      
      document.getElementById('messageBox').style.display = 'none';
    }

    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      const type = field.getAttribute('type') === 'password' ? 'text' : 'password';
      field.setAttribute('type', type);
    }

    function checkPasswordStrength() {
      const password = document.getElementById('signupPassword').value;
      const strengthBar = document.getElementById('strengthBar');
      const strengthText = document.getElementById('strengthText');
      
      let strength = 0;
      if (password.length >= 8) strength++;
      if (password.match(/[a-z]/)) strength++;
      if (password.match(/[A-Z]/)) strength++;
      if (password.match(/[0-9]/)) strength++;
      if (password.match(/[^a-zA-Z0-9]/)) strength++;
      
      const width = (strength / 5) * 100;
      strengthBar.style.width = width + '%';
      
      if (width < 40) {
        strengthBar.style.background = '#ff4d4d';
        strengthText.textContent = 'Weak password';
        strengthText.style.color = '#ff8080';
      } else if (width < 70) {
        strengthBar.style.background = '#ffa64d';
        strengthText.textContent = 'Medium password';
        strengthText.style.color = '#ffb366';
      } else {
        strengthBar.style.background = '#4caf50';
        strengthText.textContent = 'Strong password';
        strengthText.style.color = '#8bc34a';
      }
    }

    // ==================== AUTH FUNCTIONS ====================
    
    // Handle Login
    async function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const rememberMe = document.getElementById('rememberMe').checked;
      const loginBtn = document.getElementById('loginBtn');
      
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
      
      try {
        const persistence = rememberMe 
          ? firebase.auth.Auth.Persistence.LOCAL 
          : firebase.auth.Auth.Persistence.SESSION;
        await auth.setPersistence(persistence);
        
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;
        
        // Get additional user data from Firestore
        const userDoc = await db.collection('users').doc(user.uid).get();
        const userData = userDoc.data();
        
        showMessage(`Welcome back, ${userData?.name || email}! Redirecting...`, 'success');
        
        // FIXED: Redirect to dashboard.html in the same directory
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
        
      } catch (error) {
        console.error('Login error:', error);
        let errorMessage = 'Login failed. ';
        switch (error.code) {
          case 'auth/user-not-found':
          case 'auth/wrong-password':
            errorMessage += 'Invalid email or password.';
            break;
          case 'auth/too-many-requests':
            errorMessage += 'Too many attempts. Try again later.';
            break;
          case 'auth/user-disabled':
            errorMessage += 'This account has been disabled.';
            break;
          default:
            errorMessage += error.message;
        }
        showMessage(errorMessage, 'error');
        
        loginBtn.disabled = false;
        loginBtn.innerHTML = 'Login';
      }
    }

    // Handle Signup
    async function handleSignup(event) {
      event.preventDefault();
      
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const phone = document.getElementById('signupPhone').value;
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('signupConfirmPassword').value;
      const agreeTerms = document.getElementById('agreeTerms').checked;
      const signupBtn = document.getElementById('signupBtn');
      
      if (password !== confirmPassword) {
        showMessage('Passwords do not match!', 'error');
        return;
      }
      
      if (!agreeTerms) {
        showMessage('You must agree to the Terms and Privacy Policy.', 'error');
        return;
      }
      
      if (password.length < 6) {
        showMessage('Password must be at least 6 characters.', 'error');
        return;
      }
      
      signupBtn.disabled = true;
      signupBtn.innerHTML = '<span class="spinner"></span> Creating account...';
      
      try {
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;
        
        await user.updateProfile({
          displayName: name
        });
        
        try {
          await db.collection('users').doc(user.uid).set({
            name: name,
            email: email,
            phone: phone || '',
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
            uid: user.uid,
            role: 'customer',
            orders: [],
            savedProjects: []
          });
          console.log('User data saved to Firestore');
        } catch (firestoreError) {
          console.error('Firestore write error:', firestoreError);
          showMessage('Account created but profile data could not be saved. Please contact support.', 'info');
        }
        
        showMessage('Account created successfully! Redirecting...', 'success');
        
        // FIXED: Redirect to dashboard.html in the same directory
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
        
      } catch (error) {
        console.error('Signup error:', error);
        let errorMessage = 'Signup failed. ';
        switch (error.code) {
          case 'auth/email-already-in-use':
            errorMessage += 'Email already registered. Try logging in.';
            break;
          case 'auth/invalid-email':
            errorMessage += 'Invalid email address.';
            break;
          case 'auth/weak-password':
            errorMessage += 'Password is too weak.';
            break;
          case 'auth/operation-not-allowed':
            errorMessage += 'Email/password signup is not enabled. Enable it in Firebase Console.';
            break;
          default:
            errorMessage += error.message;
        }
        showMessage(errorMessage, 'error');
        
        signupBtn.disabled = false;
        signupBtn.innerHTML = 'Create Account';
      }
    }
showMessage(`Already logged in as ${user.email}. <a href="dashboard.html" style="color: #b2a5ff; text-decoration: underline;">Go to Dashboard</a>`, 'info');
    // Forgot password
    async function forgotPassword() {
      const email = document.getElementById('loginEmail').value;
      if (!email) {
        showMessage('Please enter your email address first.', 'error');
        return;
      }
      
      try {
        await auth.sendPasswordResetEmail(email);
        showMessage('Password reset email sent! Check your inbox.', 'success');
      } catch (error) {
        console.error('Reset error:', error);
        let errorMessage = 'Failed to send reset email. ';
        if (error.code === 'auth/user-not-found') {
          errorMessage += 'No account found with this email.';
        } else {
          errorMessage += error.message;
        }
        showMessage(errorMessage, 'error');
      }
    }

    // Check if user is already logged in
    auth.onAuthStateChanged((user) => {
      if (user) {
        console.log('User logged in:', user.email);
        // Optional: Show message with link to dashboard
        showMessage(`Already logged in as ${user.email}. <a href="dashboard.html" style="color: #b2a5ff; text-decoration: underline;">Go to Dashboard</a>`, 'info');
      }
    });
  </script>
